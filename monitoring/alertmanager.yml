# Alertmanager configuration.
#
# For the demo we route every alert to a webhook receiver. The easiest way to
# see this work is to create a free https://webhook.site URL and paste it
# below, or point it at any service you control. An optional email block is
# included as a comment.

global:
  resolve_timeout: 5m

route:
  receiver: 'default-webhook'
  group_by: ['alertname', 'environment']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: 'https://webhook.site/REPLACE-ME-WITH-YOUR-WEBHOOK-ID'
        send_resolved: true

  # Uncomment and fill in to also send email alerts.
  # - name: 'email'
  #   email_configs:
  #     - to: 'you@example.com'
  #       from: 'alerts@example.com'
  #       smarthost: 'smtp.example.com:587'
  #       auth_username: 'alerts@example.com'
  #       auth_password: 'your-app-password'
