# SonarQube project configuration
# Top-HD signals: clear exclusions, dedicated test paths, coverage hooks.

sonar.projectKey=devops-task-manager
sonar.projectName=DevOps Task Manager
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Don't analyse vendored code, build artefacts, or test results.
sonar.exclusions=node_modules/**,coverage/**,artifacts/**,security/**,test-results/**
sonar.coverage.exclusions=tests/**,src/server.js

# Coverage report - generated by `jest --coverage` and read via lcov.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Quality-gate hints for the scanner (also enforced by waitForQualityGate in Jenkinsfile).
sonar.qualitygate.wait=true
